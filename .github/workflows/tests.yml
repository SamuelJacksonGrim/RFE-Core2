name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:    # allow manual trigger from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Check out code
      uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # CPU-only torch first (same trick as .devcontainer): the CI runner has
        # no GPU, and the default CUDA wheels are ~10x the download for nothing.
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements.txt

    - name: Run full test suite
      # Single source of truth: this is the exact suite run locally, so CI
      # and local can never drift. Covers smoke, integration, adversarial,
      # Tier 4 physics validators (regression guards), and doc-accuracy.
      run: bash run_all_tests.sh
