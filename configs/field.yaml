# configs/field.yaml
# Resonance Field configuration for RFE-Core2
#
# LOADED AT RUNTIME by configs/loader.py (via loop/recursion1188.build_engine).
# Precedence: component __init__ default < this YAML < inline CONFIG. The values
# below mirror the code defaults, so editing one changes behavior; leaving them
# is byte-identical to the defaults. See docs/EXPERIMENTAL_LEVERS.md.

field:
  dim: 128
  decay: 0.995
  history_len: 256
  harmonic_bins: 4
  phase_history_len: 16

  # Rhythm energy thresholds — F9 rescale (2026-07-06), co-tuned against each
  # band's pinned-run equilibrium energy (stabilize ~37 full / ~13 degraded,
  # dream ~200, reflect ~294, explore ~301; dims 64 and 128 agree). The bands
  # feed back into the energy that classifies them (stabilize diffuses,
  # explore injects) AND through the governance trust loop, so do NOT retune
  # one threshold in isolation — see the DEFAULT_THRESHOLDS comment in
  # substrate/resonance_field.py and finding 2026-07-06-f9-rhythm-band-rescale
  # for the constraint set and the two recorded traps (100 and 15).
  rhythm_thresholds:
    stabilize: 5.0
    dream: 150.0
    reflect: 300.0
    # explore = everything above reflect

  # Spectral diffusion
  diffuse_alpha: 0.05
  diffuse_on_stabilize: true

watcher:
  dim: 128
  history_len: 16
  threshold: 0.40
  # Layer weights (must sum to 1.0)
  alpha: 0.40   # geometric coherence
  beta: 0.35    # temporal stability
  gamma: 0.25   # field resonance

crystal_store:
  coherence_threshold: 0.75
  stability_threshold: 0.60
  relation_threshold: 0.80
  merge_threshold: 0.92
  max_crystals: 512
  decay_rate: 0.9995
  field_injection_strength: 0.3

attractor:
  formation_threshold: 0.88
  pull_threshold: 0.75
  pull_blend: 0.15
  merge_threshold: 0.95
  max_centers: 64
  decay_rate: 0.998
